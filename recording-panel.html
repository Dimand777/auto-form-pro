<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Form Pro - Recording Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }

    .container {
      padding: 16px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .main-content {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .status-recording {
      background: #fee2e2;
      color: #dc2626;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      background: #dc2626;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-stop {
      background: #dc2626;
      color: white;
    }

    .btn-stop:hover {
      background: #b91d1d;
    }

    .btn-icon {
      font-size: 16px;
    }

    .stats-section {
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-box {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }

    .stats-number {
      font-size: 24px;
      font-weight: 700;
      color: #2563eb;
    }

    .stats-label {
      font-size: 12px;
      color: #6b7280;
    }

    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .log-area {
      flex: 1;
      background: #1f2937;
      color: #10b981;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      padding: 10px;
      border-radius: 6px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      margin-top: 12px;
      flex-shrink: 0;
    }

    .footer p {
      font-size: 11px;
      color: #6b7280;
    }

    .footer .brand {
      color: #2563eb;
      font-weight: 500;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1f2937;
    }

    ::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Auto-Form Pro</h1>
      <p>Recording in Progress...</p>
    </div>

    <div class="main-content">
      <!-- Status Bar -->
      <div id="statusBar" class="status-bar status-recording">
        <span class="status-dot"></span>
        <span id="statusText">🔴 Recording active</span>
      </div>

      <!-- Stop Button -->
      <div class="controls">
        <button id="btnStop" class="btn btn-stop">
          <span class="btn-icon">■</span>
          <span>STOP RECORDING & SAVE</span>
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-section">
        <div class="section-title">
          <span>Actions Captured</span>
        </div>
        <div class="stats-box">
          <div class="stats-number" id="actionCount">0</div>
          <div class="stats-label">actions recorded</div>
        </div>
      </div>

      <!-- Execution Log -->
      <div class="log-section">
        <div class="section-title">
          <span>Live Action Log</span>
          <span style="font-size: 10px; color: #10b981;">● LIVE</span>
        </div>
        <div id="logArea" class="log-area">Waiting for actions...
</div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>Developed by <span class="brand">Dmitri Smoljannikov</span></p>
      </div>
    </div>
  </div>

  <script src="recording-panel.js"></script>
</body>
</html>
